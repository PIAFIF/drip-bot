name: drip-bot

# Scans every 3 hours (and on manual trigger). Adjust the cron as you like —
# Awin feeds don't change more than a few times a day, so hourly is plenty.
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm start
        env:
          DRIP_BASE_URL: https://drip-fr.netlify.app
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          AWIN_FEED_URLS: ${{ secrets.AWIN_FEED_URLS }}
          AWIN_PER_FEED: '5'
          MAX_PER_RUN: '20'
