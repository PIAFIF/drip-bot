name: drip-bot

# Runs every 5 minutes (GitHub Actions' minimum) + on manual trigger.
# NOTE: GitHub's scheduler is best-effort and may delay/skip runs under load.
# On a PRIVATE repo this burns the free Actions minutes fast (~2000 min/month);
# make the repo public for unlimited minutes, or lengthen the interval.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm start
        env:
          # Post to both sites (they share the same INGEST_API_KEY). A site that
          # doesn't have the key set yet is skipped gracefully.
          DRIP_TARGETS: https://driptestv2.netlify.app,https://drip-fr.netlify.app
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          AWIN_FEED_URLS: ${{ secrets.AWIN_FEED_URLS }}
          AWIN_PER_FEED: '5'
          SHOPIFY_PER_STORE: '3'
          # High cap: every store's current markdowns are sent each run; the server
          # dedupes already-published ones, so only genuinely new deals get created.
          MAX_PER_RUN: '80'
